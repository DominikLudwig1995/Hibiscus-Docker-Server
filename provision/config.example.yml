# Hibiscus provisioning config — copy to config.yml and fill in your values.
#
#   python provision.py render --config config.yml --out ./secrets
#   python provision.py validate --config config.yml
#   python provision.py show --config config.yml
#
# For Docker deployments prefer --from-env with HIBISCUS_* env vars.
# See docker-compose.yml for the full env var reference.

# Hibiscus master password (unlocks the keystore)
hibiscus_password: "changeme"

# Web interface
http_port: 8888
http_auth: true
http_ssl: true

# Database — postgresql (default) or mysql
db_type: "postgresql"
db_host: "postgres"
db_port: 5432
db_name: "hibiscus"
db_username: "hibiscus"
db_password: "changeme"
# db_driver: "de.willuhn.jameica.hbci.server.DBSupportMySqlImpl"  # default

# Bank accounts for PIN/TAN (one entry per account).
# In Docker deployments, mount this list via HIBISCUS_ACCOUNTS_FILE.
accounts:
  - name: "mybank"
    server: "hbci.mybank.de"
    port: 443
    blz: "12345678"
    userid: "myuserid"
    customerid: "myuserid"   # optional — defaults to userid
    hbciversion: "300"       # optional
