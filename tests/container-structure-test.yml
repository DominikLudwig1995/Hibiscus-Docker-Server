schemaVersion: "2.0.0"

metadataTest:
  exposedPorts: ["8888"]

commandTests:
  - name: "Java is available"
    command: "java"
    args: ["-version"]
    exitCode: 0

  - name: "Python3 is available"
    command: "python3"
    args: ["--version"]
    exitCode: 0

  - name: "Provisioning venv is installed"
    command: "/opt/venv/bin/python"
    args: ["-c", "import jinja2, yaml, click, rich"]
    exitCode: 0

  - name: "Provision CLI responds to --help"
    command: "/opt/venv/bin/python"
    args: ["/opt/provision/provision.py", "--help"]
    exitCode: 0

  - name: "Hibiscus server directory exists"
    command: "test"
    args: ["-d", "/home/hibiscus/hibiscus-server"]
    exitCode: 0

  - name: "Jinja2 templates directory exists"
    command: "test"
    args: ["-d", "/opt/provision/templates"]
    exitCode: 0

  - name: "Hibiscus startup script exists and is executable"
    command: "test"
    args: ["-x", "/home/hibiscus/hibiscus-server/jameicaserver.sh"]
    exitCode: 0

  - name: "MariaDB connector jar is present"
    command: "sh"
    args: ["-c", "ls /home/hibiscus/hibiscus-server/lib/mysql/mariadb-java-client-*.jar"]
    exitCode: 0

  - name: "No Windows artefacts remain"
    command: "sh"
    args: ["-c", "! test -f /home/hibiscus/hibiscus-server/jameicaserver.exe"]
    exitCode: 0

  - name: "No legacy MySQL connector jars remain"
    command: "sh"
    args: ["-c", "! ls /home/hibiscus/hibiscus-server/lib/mysql/mysql-connector-java-*.jar 2>/dev/null"]
    exitCode: 0

  - name: "Entrypoint script is executable"
    command: "test"
    args: ["-x", "/entrypoint.sh"]
    exitCode: 0

fileExistenceTests:
  - name: "Provisioning script"
    path: "/opt/provision/provision.py"
    shouldExist: true

  - name: "HBCIDBService template"
    path: "/opt/provision/templates/HBCIDBService.properties.j2"
    shouldExist: true

  - name: "PinTanConfig template"
    path: "/opt/provision/templates/PinTanConfig.properties.j2"
    shouldExist: true

  - name: "Plugin template"
    path: "/opt/provision/templates/Plugin.properties.j2"
    shouldExist: true

  - name: "UpdateService static config"
    path: "/home/hibiscus/hibiscus-server/cfg/de.willuhn.jameica.services.UpdateService.properties"
    shouldExist: true

fileContentTests:
  - name: "Auto-update is disabled"
    path: "/home/hibiscus/hibiscus-server/cfg/de.willuhn.jameica.services.UpdateService.properties"
    expectedContents: ["update.check=false"]
