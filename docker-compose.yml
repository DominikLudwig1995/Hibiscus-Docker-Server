services:
  hibiscus-service:
    image: ghcr.io/dominikludwig1995/hibiscus:latest
    container_name: hibiscus
    restart: unless-stopped
    build:
      context: .
      args:
        HIBISCUS_VERSION: "2.10.7"
    volumes:
      - ${SECRETS_PATH:-/opt/hibiscus/secrets}/pwd:/run/secret/pwd:ro
      - ${SECRETS_PATH:-/opt/hibiscus/secrets}/HBCIDBService.properties:/home/hibiscus/hibiscus-server/cfg/de.willuhn.jameica.hbci.rmi.HBCIDBService.properties:ro
      - ${SECRETS_PATH:-/opt/hibiscus/secrets}/PinTanConfig.properties:/home/hibiscus/hibiscus-server/cfg/de.willuhn.jameica.hbci.passports.pintan.rmi.PinTanConfig.properties:ro
      - ${JAMEICA_DATA_PATH:-/opt/hibiscus/data}:/home/hibiscus/.jameica:rw
    ports:
      - "${HIBISCUS_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

